<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Retail Tower Console logo: dashboard in cyan">
  <title>Retail Tower Console</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/><stop offset="1" stop-color="#063243"/>
    </linearGradient>
    <linearGradient id="hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gl" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/><stop offset="1" stop-color="#cbd5e1" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="ds" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#bg)" filter="url(#ds)"/>
  <rect x="16" y="16" width="224" height="120" rx="54" fill="url(#hi)"/>
  <circle cx="128" cy="130" r="78" fill="url(#gl)"/>
  <g transform="translate(80,80)" fill="url(#chrome)">
    <rect x="0" y="0" width="96" height="94" rx="10" fill="#063243" stroke="url(#chrome)" stroke-width="3"/>
    <rect x="14" y="52" width="14" height="28" rx="3"/>
    <rect x="34" y="34" width="14" height="46" rx="3"/>
    <rect x="54" y="42" width="14" height="38" rx="3"/>
    <rect x="74" y="22" width="12" height="58" rx="3" opacity="0.8"/>
  </g>
  <rect x="16.5" y="16.5" width="223" height="223" rx="53.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
</svg>
