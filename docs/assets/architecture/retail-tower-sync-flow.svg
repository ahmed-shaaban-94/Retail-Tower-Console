<svg xmlns="http://www.w3.org/2000/svg" aria-label="Retail Tower OS synchronization flow: POS-Pulse and Retail-Tower-Console synchronize through Data-Pulse-2, which is the contract boundary to the ERPNext Connector and ERPNext/Frappe." font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" viewBox="0 0 1280 760"><title>Retail Tower OS — Synchronization Flow</title><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0a0f24"/><stop offset=".55" stop-color="#0d1330"/><stop offset="1" stop-color="#070a1c"/></linearGradient><radialGradient id="hubGlow" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#38bdf8" stop-opacity=".45"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient><linearGradient id="cardPOS" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1e3a8a"/><stop offset="1" stop-color="#0b1c52"/></linearGradient><linearGradient id="cardCON" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0e7490"/><stop offset="1" stop-color="#063243"/></linearGradient><linearGradient id="cardDP" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#3b1283"/></linearGradient><linearGradient id="cardCONN" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#5c2705"/></linearGradient><linearGradient id="cardERP" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#052e2b"/></linearGradient><linearGradient id="edgeShade" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity=".55"/><stop offset="1" stop-color="#000" stop-opacity=".85"/></linearGradient><linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".95"/><stop offset="1" stop-color="#cbd5e1" stop-opacity=".7"/></linearGradient><linearGradient id="flowUp" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/></linearGradient><linearGradient id="flowDown" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#60a5fa"/></linearGradient><filter id="soft" width="180%" height="180%" x="-40%" y="-40%"><feDropShadow dx="0" dy="10" flood-color="#000" flood-opacity=".55" stdDeviation="12"/></filter><filter id="glow" width="260%" height="260%" x="-80%" y="-80%"><feGaussianBlur result="b" stdDeviation="3.2"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>@keyframes pulse{0%{opacity:.55}50%{opacity:1}}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes ring{0%{transform:scale(.6);opacity:.7}}.title{fill:#f8fafc;font-weight:700}.sub{fill:#94a3b8;font-weight:500}.nodeT{fill:#f8fafc;font-weight:700}.nodeS{fill:#cbd5e1;font-weight:500}.lane{fill:#e2e8f0;font-weight:600}.pulse{animation:pulse 3.2s ease-in-out infinite;transform-origin:center}.float,.float2{animation:float 5s ease-in-out infinite}.float2{animation-delay:-2.5s}.ring{animation:ring 3.2s ease-out infinite;transform-origin:166px 542px}@media (prefers-reduced-motion:reduce){.float,.float2,.pulse,.ring{animation:none}}</style></defs><rect width="1280" height="760" fill="url(#bg)"/><g stroke="#1e293b" stroke-width="1" opacity=".4"><path d="M0 190 H1280 M0 530 H1280"/><path d="M320 0 V760 M740 0 V760 M1030 0 V760"/></g><text x="64" y="64" class="title" font-size="34">Retail Tower OS — Console in the Flow</text><text x="64" y="96" class="sub" font-size="17">The Console is a contract-only admin surface. It reads from Data-Pulse-2 and never touches ERPNext directly.</text><g fill="none" stroke-linecap="round"><path id="pPOS" d="M270 200 C360 200 360 300 460 322"/><path id="pCON" d="M270 540 C360 540 360 408 460 388"/><path id="pSPINE1" d="M600 360 L740 360"/><path id="pSPINE2" d="M880 360 L1010 360"/><use stroke="#334155" stroke-width="6" href="#pPOS"/><use stroke="#334155" stroke-width=