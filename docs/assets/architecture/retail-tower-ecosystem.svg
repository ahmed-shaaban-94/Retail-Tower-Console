<svg xmlns="http://www.w3.org/2000/svg" aria-label="Retail Tower OS ecosystem: the Retail Tower Orchestrator control plane governs five repositories. POS-Pulse and Retail-Tower-Console synchronize through Data-Pulse-2, the single contract boundary, which reaches ERPNext only through the ERPNext Connector." font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" viewBox="0 0 1280 880"><title>Retail Tower OS — Ecosystem &amp; Synchronization</title><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0a0f24"/><stop offset=".55" stop-color="#0d1330"/><stop offset="1" stop-color="#070a1c"/></linearGradient><radialGradient id="hubGlow" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#38bdf8" stop-opacity=".45"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient><linearGradient id="cardORCH" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#475569"/><stop offset="1" stop-color="#1e293b"/></linearGradient><linearGradient id="cardPOS" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1e3a8a"/><stop offset="1" stop-color="#0b1c52"/></linearGradient><linearGradient id="cardCON" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0e7490"/><stop offset="1" stop-color="#063243"/></linearGradient><linearGradient id="cardDP" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#3b1283"/></linearGradient><linearGradient id="cardCONN" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#5c2705"/></linearGradient><linearGradient id="cardERP" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#052e2b"/></linearGradient><linearGradient id="edgeShade" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity=".55"/><stop offset="1" stop-color="#000" stop-opacity=".85"/></linearGradient><linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".95"/><stop offset="1" stop-color="#cbd5e1" stop-opacity=".7"/></linearGradient><linearGradient id="flowUp" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/></linearGradient><linearGradient id="flowDown" x1="0" x2="1" y1="0" y2="0"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#60a5fa"/></linearGradient><filter id="soft" width="180%" height="180%" x="-40%" y="-40%"><feDropShadow dx="0" dy="10" flood-color="#000" flood-opacity=".55" stdDeviation="12"/></filter><filter id="glow" width="260%" height="260%" x="-80%" y="-80%"><feGaussianBlur result="b" stdDeviation="3.2"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>@keyframes pulse{0%{opacity:.6}50%{opacity:1}}@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes ring{0%{transform:scale(.6);opacity:.7}}@keyframes herep{0%{stroke-opacity:1}50%{stroke-opacity:.35}}.title{fill:#f8fafc;font-weight:700}.sub{fill:#94a3b8;font-weight:500}.nodeT{fill:#f8fafc;font-weight:700}.nodeS{fill:#cbd5e1;font-weight:500}.lane{fill:#e2e8f0;font-weight:600}.orchT{fill:#f8fafc;font-weight:700;letter-spacing:.5px}.pulse{animation:pulse 3.2s ease-in-out infinite;transform-origin:center}.float,.float2{animation:float 5s ease-in-out infinite}.float2{animation-delay:-2.5s}.ring{animation:ring 3.2s ease-out infinite;transform-origin:540px 500px}.gov{stroke-dasharray:4 8;animation:gov 1.4s linear infinite}@media (prefers-reduced-motion:reduce){.float,.float2,.gov,.pulse,.ring{animation:none}}.here rect.box{animation:herep 2.2s ease-in-out infinite}@media (prefers-reduced-motion:reduce){.here rect.box{animation:none}}</style></defs><rect width="1280" height="880" fill="url(#bg)"/><g stroke="#1e293b" stroke-width="1" opacity=".4"><path d="M0 320 H1280 M0 660 H1280"/><path d="M320 240 V880 M740 240 V880 M1030 240 V880"/></g><text x="64" y="60" class="title" font-size="34">Retail Tower OS — Ecosystem &amp; Synchronization</text><text x="64" y="92" class="sub" font-size="17">One control plane · five repositories · a single contract boundary. No edge ever reaches ERPNext directly.</text><g class="pulse"><rect width="1152" height="80" x="64" y="128" fill="url(#edgeShade)" rx="20" transform="translate(0,8)"/><rect width="1152" height="80" x="64" y="128" fill="url(#cardORCH)" filter="url(#soft)" rx="20"/><rect width="1152" height="30" x="64" y="128" fill="#fff" opacity=".08" rx="20"/><g fill="url(#chrome)" transform="translate(92,146)"><path d="M10 0 L20 0 L22 10 L8 10 Z"/><rect width="18" height="34" x="6" y="10" fill="#1e293b" stroke="url(#chrome)" stroke-width="2" rx="2"/><rect width="4" height="6" x="10" y="16"/><rect width="4" height="6" x="16" y="16"/><rect width="4" height="6" x="10" y="26"/><rect width="4" height="6" x="16" y="26"/><rect width="2" height="8" x="13" y="-8"/></g><text x="132" y="166" class="orchT" font-size="20">Retail Tower Orchestrator</text><text x="132" y="190" class="nodeS" font-size="13">Cross-repo control plane · docs-only · roadmap · gates · dependency graph · sequenced &amp; auditable dispatch</text><text x="1180" y="174" fill="#38bdf8" font-size="11" font-weight="700" text-anchor="end">GOVERNS ▾</text></g><g fill="none" stroke="#38bdf8" stroke-linecap="round" stroke-width="1.6" opacity=".5"><path d="M168 208 V300" class="gov"/><path d="M40 208 V612 C40 612 40 612 64 612" class="gov"/><path d="M540 208 V428" class="gov"/><path d="M860 208 V430" class="gov"/><path d="M1127 208 V430" class="gov"/></g><g fill="none" stroke-linecap="round"><path id="pPOS" d="M272 352 C360 352 360 450 430 462"/><path id="pCON" d="M272 612 C360 612 360 528 430 516"/><path id="pSPINE1" d="M650 489 L770 489"/><path id="pSPINE2" d="M950 489 L1035 489"/><use stroke="#334155" stroke-width="6" href="#pPOS"/><use stroke="#334155" stroke-width="6" href="#pCON"/><use stroke="#334155" stroke-width="6" href="#pSPINE1"/><use stroke="#334155" stroke-width="6" href="#pSPINE2"/></g><circle cx="540" cy="500" r="74" fill="none" stroke="#38bdf8" stroke-width="2.5" class="ring"/><circle cx="540" cy="500" r="155" fill="url(#hubGlow)"/><g filter="url(#glow)"><circle r="6" fill="url(#flowUp)"><animateMotion dur="3.4s" repeatCount="indefinite" rotate="auto"><mpath href="#pPOS"/></animateMotion></circle><circle r="6" fill="url(#flowUp)"><animateMotion begin="-1.7s" dur="3.4s" repeatCount="indefinite"><mpath href="#pCON"/></animateMotion></circle><circle r="6.5" fill="url(#flowUp)"><animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#pSPINE1"/></animateMotion></circle><circle r="6.5" fill="url(#flowUp)"><animateMotion begin="-1.2s" dur="2.4s" repeatCount="indefinite"><mpath href="#pSPINE2"/></animateMotion></circle></g><g filter="url(#glow)"><circle r="6.5" fill="url(#flowDown)"><animateMotion begin="-0.6s" calcMode="linear" dur="2.4s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite"><mpath href="#pSPINE2"/></animateMotion></circle><circle r="6.5" fill="url(#flowDown)"><animateMotion begin="-1.8s" calcMode="linear" dur="2.4s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite"><mpath href="#pSPINE1"/></animateMotion></circle><circle r="6" fill="url(#flowDown)"><animateMotion begin="-2.4s" calcMode="linear" dur="3.4s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite"><mpath href="#pPOS"/></animateMotion></circle><circle r="6" fill="url(#flowDown)"><animateMotion begin="-0.8s" calcMode="linear" dur="3.4s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite"><mpath href="#pCON"/></animateMotion></circle></g><g class="float"><rect width="208" height="104" x="64" y="300" fill="url(#edgeShade)" rx="18" transform="translate(0,9)"/><rect width="208" height="104" x="64" y="300" fill="url(#cardPOS)" filter="url(#soft)" rx="18"/><rect width="208" height="40" x="64" y="300" fill="#fff" opacity=".1" rx="18"/><g fill="url(#chrome)" transform="translate(88,326)"><rect width="44" height="30" x="0" y="0" fill="#0b1c52" stroke="url(#chrome)" stroke-width="2" rx="4"/><rect width="34" height="14" x="5" y="5" fill="#60a5fa" opacity=".85" rx="1.5"/><rect width="20" height="5" x="12" y="34" rx="2"/><rect width="32" height="4" x="6" y="41" rx="2"/></g><text x="148" y="336" class="nodeT" font-size="19">POS-Pulse</text><text x="148" y="360" class="nodeS" font-size="13">Windows retail terminal</text><text x="148" y="380" class="nodeS" font-size="12" opacity=".8">offline-first · sale outbox</text></g><g class="float2"><rect width="208" height="104" x="64" y="560" fill="url(#edgeShade)" rx="18" transform="translate(0,9)"/><rect width="208" height="104" x="64" y="560" fill="url(#cardCON)" filter="url(#soft)" rx="18"/><rect width="208" height="40" x="64" y="560" fill="#fff" opacity=".1" rx="18"/><g fill="url(#chrome)" transform="translate(88,586)"><rect width="44" height="40" x="0" y="0" fill="#063243" stroke="url(#chrome)" stroke-width="2" rx="4"/><rect width="6" height="12" x="6" y="22" rx="1.5"/><rect width="6" height="20" x="16" y="14" rx="1.5"/><rect width="6" height="16" x="26" y="18" rx="1.5"/><rect width="4" height="25" x="36" y="9" opacity=".7" rx="1.5"/></g><text x="148" y="596" class="nodeT" font-size="19">Console</text><text x="148" y="620" class="nodeS" font-size="13">Admin web console</text><text x="148" y="640" class="nodeS" font-size="12" opacity=".8">tenant · catalog · sync ops</text></g><g class="pulse"><rect width="220" height="144" x="430" y="428" fill="url(#edgeShade)" rx="22" transform="translate(0,11)"/><rect width="220" height="144" x="430" y="428" fill="url(#cardDP)" filter="url(#soft)" rx="22"/><rect width="220" height="48" x="430" y="428" fill="#fff" opacity=".12" rx="22"/><g fill="url(#chrome)" transform="translate(460,462)"><ellipse cx="22" cy="6" fill="#3b1283" stroke="url(#chrome)" stroke-width="2" rx="22" ry="7"/><path fill="#5b21b6" stroke="url(#chrome)" stroke-width="2" d="M0 6 V40 a22 7 0 0 0 44 0 V6"/><ellipse cx="22" cy="22" fill="none" stroke="url(#chrome)" stroke-width="1.6" opacity=".7" rx="22" ry="7"/><ellipse cx="22" cy="6" fill="#7c3aed" rx="22" ry="7"/></g><text x="520" y="472" class="nodeT" font-size="20">Data-Pulse-2</text><text x="520" y="496" class="nodeS" font-size="13">Backend · contract boundary</text><text x="520" y="516" class="nodeS" font-size="12" opacity=".85">OpenAPI · RLS · outbox</text><text x="520" y="548" fill="#38bdf8" font-size="11" font-weight="700">◆ SINGLE SOURCE OF TRUTH</text></g><g class="float"><rect width="180" height="120" x="770" y="430" fill="url(#edgeShade)" rx="18" transform="translate(0,9)"/><rect width="180" height="120" x="770" y="430" fill="url(#cardCONN)" filter="url(#soft)" rx="18"/><rect width="180" height="40" x="770" y="430" fill="#fff" opacity=".1" rx="18"/><g fill="url(#chrome)" transform="translate(792,462)"><rect width="20" height="16" x="0" y="14" rx="3"/><rect width="9" height="3.5" x="-7" y="18" rx="1.5"/><rect width="9" height="3.5" x="-7" y="23" rx="1.5"/><rect width="12" height="4" x="20" y="20" rx="2"/><path fill="#5c2705" stroke="url(#chrome)" stroke-width="2" d="M32 12 h10 a8 8 0 0 1 8 8 v4 a8 8 0 0 1 -8 8 h-10 z"/></g><text x="860" y="476" class="nodeT" font-size="17">Connector</text><text x="860" y="498" class="nodeS" font-size="12">Frappe / ERPNext app</text><text x="860" y="516" class="nodeS" font-size="11" opacity=".8">contract-first adapter</text></g><g class="float2"><rect width="184" height="120" x="1035" y="430" fill="url(#edgeShade)" rx="18" transform="translate(0,9)"/><rect width="184" height="120" x="1035" y="430" fill="url(#cardERP)" filter="url(#soft)" rx="18"/><rect width="184" height="40" x="1035" y="430" fill="#fff" opacity=".1" rx="18"/><g fill="url(#chrome)" transform="translate(1059,460)"><path fill="#0f766e" stroke="url(#chrome)" stroke-width="2" d="M2 12 L22 2 L42 12 Z"/><rect width="36" height="26" x="4" y="12" fill="#052e2b" stroke="url(#chrome)" stroke-width="2"/><rect width="6" height="20" x="9" y="18"/><rect width="6" height="20" x="19" y="18"/><rect width="6" height="20" x="29" y="18"/></g><text x="1127" y="476" class="nodeT" font-size="17">ERPNext</text><text x="1127" y="498" class="nodeS" font-size="12">Frappe ledger</text><text x="1127" y="516" class="nodeS" font-size="11" opacity=".8">system of record</text></g><g transform="translate(64,790)"><text x="0" y="-12" class="lane" font-size="13" letter-spacing=".5">DATA FLOW</text><circle cx="8" cy="14" r="6" fill="url(#flowUp)" filter="url(#glow)"/><text x="24" y="19" class="nodeS" font-size="14">Capture-UP — sales &amp; inventory rise toward ERPNext</text><circle cx="8" cy="42" r="6" fill="url(#flowDown)" filter="url(#glow)"/><text x="24" y="47" class="nodeS" font-size="14">Read-DOWN — catalog &amp; product master flow to the edge</text></g><g><text x="0" y="-12" class="lane" font-size="13" letter-spacing=".5" transform="translate(720,790)">CONTROL</text><path fill="none" stroke="#38bdf8" stroke-width="2" d="M0 14 H22" class="gov" transform="translate(720,790)"/><text x="34" y="19" class="nodeS" font-size="14" transform="translate(720,790)">Governance — Orchestrator sequences &amp; gates every repo</text></g><g class="here float2"><rect width="208" height="104" x="64" y="560" fill="none" stroke="#fbbf24" stroke-width="3" class="box" filter="url(#glow)" rx="18"/><g transform="translate(168,550)"><rect width="104" height="22" x="-52" y="-13" fill="#fbbf24" rx="11"/><text x="0" y="2" fill="#3a2400" dominant-baseline="middle" font-size="11" font-weight="700" text-anchor="middle">★ THIS REPO</text></g></g></svg>